name: release

# Build the wrapper image and push to GitHub Container Registry.
#
# Triggered on `v*` tag pushes (e.g. `git tag v0.1.0 && git push --tags`) and
# manually via the Actions UI. Pushed to ghcr.io/crit-fumble/cfg-server-foundryvtt
# with: the git ref (e.g. v0.1.0), `latest` (default-branch tags), sha-<short>, and
# `14` — the Foundry MAJOR tag (felddy-style moving tag for the 14.x line). The CFG
# platform launches campaign containers as `<imageName>:<foundryMajor>` (see
# foundry-platform getFoundryImageTag), so `cfg-server-foundryvtt:14` is the tag the
# core-server actually pulls. Bump it alongside the felddy base `FROM` digest when
# moving to Foundry 15.
#
# Also builds the service-GM drain DRIVER image (agent/) -> ghcr.io/crit-fumble/
# cfg-foundry-service-gm, the one-shot headless Chromium container core-server's
# launcher spawns (default tag :latest). Both are pure-Docker builds (no BuildKit
# npmrc secret needed yet).
#
# Mirrors cfg-server-disrecord / cfg-core-server release.yml.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Used only for naming when run manually.'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/crit-fumble/cfg-server-foundryvtt
          tags: |
            type=ref,event=tag
            type=raw,value=14
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-agent:
    # The service-GM drain driver (one-shot headless Chromium). core-server's
    # launcher pulls ghcr.io/crit-fumble/cfg-foundry-service-gm:latest by default.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/crit-fumble/cfg-foundry-service-gm
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
